services:
  db:
    image: postgres:16-alpine
    container_name: clinica
    environment:
      POSTGRES_USER: estudiante
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: clinica
    ports:
      - "5432:5432"
    volumes:
      - pgdata-ejercicios:/var/lib/postgresql/data

volumes:
  pgdata-ejercicios:
